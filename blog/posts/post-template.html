<!doctype html>

  <link rel="stylesheet" href="/assets/css/styles.css" />

<body data-wa-phone="5493425661863">
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <strong>Hugo Catalán</strong>
        <span>Blog</span>
      </a>
      <nav class="nav" aria-label="Navegación">
        <a href="/blog/">Volver</a>

        <button id="themeToggle" class="btn theme-toggle" aria-label="Cambiar tema">🌙</button>

        <hr style="border:0; border-top:1px solid var(--border); margin: 18px 0;" />

        <div style="display:grid; gap: 12px;">
          <p><!-- Contenido del post (tuyo o comentario + fuente) --></p>
        </div>

        <div style="margin-top: 18px;">
          <a class="btn btn-primary" data-wa="athlete" href="#">Hablar por WhatsApp</a>
